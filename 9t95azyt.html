<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael Nham — Office Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root {
    --bg:#0c0f14;--surface:#14181f;--surface2:#1a1f29;--border:#252b37;
    --text:#e4e7ec;--text-dim:#8892a4;--text-muted:#5a6478;
    --green:#34d399;--green-dim:rgba(52,211,153,0.12);
    --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);
    --red:#f87171;--red-dim:rgba(248,113,113,0.12);
    --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);
    --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
    --accent:#34d399;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 24px}

  .header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:24px}
  .header-left h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
  .header-left h1 span{color:var(--accent)}
  .header-left .subtitle{font-size:13px;color:var(--text-dim);margin-top:4px}

  /* Language toggle */
  .lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;align-self:flex-start}
  .lang-btn{padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:transparent;color:var(--text-muted)}
  .lang-btn.active{background:var(--accent);color:var(--bg)}
  .lang-btn:hover:not(.active){color:var(--text)}

  .date-controls{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .date-controls label{font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.6px}
  .date-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px 12px;border-radius:8px;outline:none;transition:border-color .15s}
  .date-input:focus{border-color:var(--accent)}
  .date-input::-webkit-calendar-picker-indicator{filter:invert(0.7)}
  .preset-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s}
  .preset-btn:hover{border-color:var(--text-muted);color:var(--text)}
  .preset-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .date-divider{color:var(--text-muted);font-size:13px}
  .record-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);margin-left:auto}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
  .kpi .kl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:6px}
  .kpi .kv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600}
  .kpi .ks{font-size:11px;color:var(--text-dim);margin-top:4px}

  .controls{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  .controls label{font-size:12px;color:var(--text-dim);font-weight:500}
  .sort-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s}
  .sort-btn:hover{border-color:var(--text-muted);color:var(--text)}
  .sort-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
  .filter-btns{display:flex;gap:6px;margin-left:auto}
  .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s}
  .filter-btn:hover{border-color:var(--text-muted)}
  .filter-btn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

  .legend{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
  .legend-dot{width:8px;height:8px;border-radius:2px}

  .rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:32px}
  .rep-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .2s;overflow:hidden}
  .rep-card:hover{border-color:var(--text-muted)}
  .rep-card.flagged{border-left:3px solid var(--red)}
  .rep-card.new-rep{border-left:3px solid var(--blue)}
  .rep-card.no-data{opacity:0.4}
  .rep-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .rep-name{font-size:14px;font-weight:700;letter-spacing:-0.2px}
  .rep-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
  .rep-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
  .badge-green{background:var(--green-dim);color:var(--green)}
  .badge-amber{background:var(--amber-dim);color:var(--amber)}
  .badge-red{background:var(--red-dim);color:var(--red)}
  .badge-blue{background:var(--blue-dim);color:var(--blue)}
  .badge-muted{background:var(--surface2);color:var(--text-muted)}
  .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .metric{background:var(--surface2);border-radius:8px;padding:10px 12px}
  .metric .ml{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:4px}
  .metric .mv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600}
  .metric .md{font-size:10px;color:var(--text-dim);margin-top:2px}
  .metric.fw{grid-column:1/-1}
  .b1-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .b1-bar-fill{height:100%;border-radius:3px}

  .color-green{color:var(--green)}.color-amber{color:var(--amber)}.color-red{color:var(--red)}.color-blue{color:var(--blue)}.color-purple{color:var(--purple)}

  .footnote{font-size:11px;color:var(--text-muted);margin-top:20px;padding-top:16px;border-top:1px solid var(--border);line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Michael Nham — <span>Office Dashboard</span></h1>
    <div class="subtitle">HelloFresh Canada D2D · 8 Active Reps · Interactive Date Range</div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="langEN" onclick="setLang('en')">ENG</button>
    <button class="lang-btn" id="langFR" onclick="setLang('fr')">FR</button>
  </div>
</div>

<div class="date-controls">
  <label id="lbl_from">From</label>
  <input type="date" class="date-input" id="startDate" value="2025-01-01">
  <span class="date-divider">→</span>
  <label id="lbl_to">To</label>
  <input type="date" class="date-input" id="endDate" value="2026-04-17">
  <div style="display:flex;gap:6px;flex-wrap:wrap" id="presetWrap">
    <button class="preset-btn" data-preset="all">All Time</button>
    <button class="preset-btn" data-preset="2026">2026 YTD</button>
    <button class="preset-btn" data-preset="q1">Q1 2026</button>
    <button class="preset-btn" data-preset="feb-apr">Feb 1 – Apr 4</button>
    <button class="preset-btn" data-preset="90d">Last 90 Days</button>
    <button class="preset-btn" data-preset="30d">Last 30 Days</button>
  </div>
  <div class="record-count" id="recordCount">—</div>
</div>

<div class="kpi-grid" id="kpis"></div>

<div class="legend" id="legend"></div>
<div class="controls" id="controls"></div>
<div class="rep-grid" id="repGrid"></div>

<div class="footnote" id="footnote"></div>

function rc(r, tt) {
  if (tt === 'b2') return r >= 55 ? 'green' : r >= 45 ? 'amber' : 'red';
  if (tt === 'cancel') return r <= 18 ? 'green' : r <= 25 ? 'amber' : 'red';
  if (tt === 'b1only') return r <= 40 ? 'green' : r <= 50 ? 'amber' : 'red';
  return 'amber';
}

function computeStats(startStr, endStr) {
  const start = new Date(startStr);
  const end = new Date(endStr);
  end.setHours(23,59,59);
  const filtered = RAW.filter(r => { if (!r.s) return false; const d = new Date(r.s); return d >= start && d <= end; });
  document.getElementById('recordCount').textContent = filtered.length.toLocaleString() + ' ' + t('orders');
  const total = filtered.length;
  const cancels = filtered.filter(r => r.c).length;
  const b1Del = filtered.filter(r => r.b1 !== null).length;
  const genuine = filtered.filter(r => r.b1 !== null);
  const b2Del = genuine.filter(r => r.b2 !== null).length;
  const office = {
    total, cancelRate: total ? +(cancels/total*100).toFixed(1) : 0,
    b1DelRate: total ? +(b1Del/total*100).toFixed(1) : 0,
    b2Rate: genuine.length ? +(b2Del/genuine.length*100).toFixed(1) : 0,
    b1OnlyPct: genuine.length ? +((genuine.length-b2Del)/genuine.length*100).toFixed(1) : 0,
    genuine: genuine.length, b2Count: b2Del,
  };
  const repMap = {};
  REPS.forEach(r => { repMap[r.name] = { ...r, records: [] }; });
  filtered.forEach(r => { if (repMap[r.r]) repMap[r.r].records.push(r); });
  const repStats = REPS.map(rep => {
    const recs = repMap[rep.name].records;
    const tt = recs.length;
    if (tt === 0) return { name:rep.name, created:rep.created, total:0, weeks:0, avgB1:0, cancel24h:0, cancelRate:0, b1Del:0, b1DelRate:0, genuine:0, b2:0, b2Rate:0, b1Only:0 };
    const weekMap = {};
    recs.forEach(r => { weekMap[r.w] = (weekMap[r.w]||0)+1; });
    const weeks = Object.keys(weekMap).length;
    const avgB1 = +(tt/weeks).toFixed(1);
    const c24 = recs.filter(r => r.c).length;
    const b1d = recs.filter(r => r.b1 !== null).length;
    const gen = recs.filter(r => r.b1 !== null);
    const b2c = gen.filter(r => r.b2 !== null).length;
    return { name:rep.name, created:rep.created, total:tt, weeks, avgB1, cancel24h:c24,
      cancelRate: tt ? +(c24/tt*100).toFixed(1) : 0, b1Del:b1d,
      b1DelRate: tt ? +(b1d/tt*100).toFixed(1) : 0, genuine:gen.length, b2:b2c,
      b2Rate: gen.length ? +(b2c/gen.length*100).toFixed(1) : 0,
      b1Only: gen.length ? +((gen.length-b2c)/gen.length*100).toFixed(1) : 0 };
  });
  return { office, reps: repStats };
}

      <button class="filter-btn ${currentFilter==='low'?'active':''}" data-filter="low">${t('low_vol')}</button>
    </div>`;

  document.querySelectorAll('.sort-btn').forEach(b => b.addEventListener('click', () => { currentSort = b.dataset.sort; render(); }));

  if (currentSort === 'volume') filtered.sort((a,b) => b.total - a.total);

  // Cards
  document.getElementById('repGrid').innerHTML = filtered.map(r => {

function clearPresets() { document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active')); }

const presets = {
  'all': ['2025-01-01', '2026-04-30'], '2026': ['2026-01-01', '2026-04-30'],
  'q1': ['2026-01-01', '2026-03-31'], 'feb-apr': ['2026-02-01', '2026-04-04'],
  '90d': [new Date(Date.now()-90*86400000).toISOString().slice(0,10), '2026-04-30'],
  '30d': [new Date(Date.now()-30*86400000).toISOString().slice(0,10), '2026-04-30'],
};
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    clearPresets(); btn.classList.add('active');
    const p = presets[btn.dataset.preset];
    document.getElementById('startDate').value = p[0];
    document.getElementById('endDate').value = p[1];
    render();
  });
});

// Init
document.querySelector('[data-preset="all"]').classList.add('active');
render();
</script>
</body>
</html>
